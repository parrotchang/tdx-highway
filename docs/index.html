<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>國道即時路況快檢</title>
    <style>
        body { font-family: -apple-system, "Microsoft JhengHei", sans-serif; background-color: #f4f4f9; margin: 0; padding: 20px; }
        .container { max-width: 900px; margin: auto; background: white; padding: 20px; border-radius: 12px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        h1 { text-align: center; color: #333; }
        .search-box { width: 100%; padding: 12px; margin-bottom: 20px; border: 1px solid #ddd; border-radius: 8px; font-size: 16px; box-sizing: border-box; }
        
        .traffic-table { width: 100%; border-collapse: collapse; }
        .traffic-table th, .traffic-table td { padding: 12px; text-align: left; border-bottom: 1px solid #eee; }
        .traffic-table th { background-color: #f8f9fa; }

        .speed-tag { padding: 4px 8px; border-radius: 4px; font-weight: bold; color: white; text-align: center; display: inline-block; min-width: 40px; }
        .speed-green { background-color: #28a745; }
        .speed-orange { background-color: #fd7e14; }
        .speed-red { background-color: #dc3545; }
        
        .update-time { font-size: 12px; color: #888; text-align: right; margin-bottom: 10px; }
        .loading { text-align: center; color: #666; padding: 20px; font-weight: bold; }
        .error { color: #dc3545; text-align: center; padding: 10px; font-weight: bold; }
    </style>
</head>
<body>

<div class="container">
    <h1>🛣️ 國道即時路況快檢</h1>
    <div id="updateTime" class="update-time">等待獲取資料...</div>
    <input type="text" id="search" class="search-box" placeholder="輸入道路名稱或地名 (如：國1, 桃園, 圓山)...">
    
    <div id="loading" class="loading">正在向伺服器獲取即時數據...</div>
    
    <table class="traffic-table" id="trafficTable" style="display:none;">
        <thead>
            <tr>
                <th>路段名稱</th>
                <th>方向</th>
                <th>即時時速</th>
            </tr>
        </thead>
        <tbody id="trafficBody">
            <!-- 資料會插入到這裡 -->
        </tbody>
    </table>
</div>

<script>
    // ==========================================
    // ⚠️ 填入你剛剛部署的 Cloudflare Worker 網址
    // ==========================================
    const WORKER_API_URL = '[https://tdx-highway.parrotchang.workers.dev/](https://tdx-highway.parrotchang.workers.dev/)';
    
    let trafficData = []; // 儲存從 Worker 拿到的資料

    async function fetchTrafficData() {
        try {
            document.getElementById('loading').style.display = 'block';
            document.getElementById('trafficTable').style.display = 'none';

            // 直接向自己的 Worker 拿處理好的資料
            const response = await fetch(WORKER_API_URL);
            if (!response.ok) throw new Error("伺服器回應錯誤");
            
            trafficData = await response.json();

            if(trafficData.error) throw new Error(trafficData.error);

            renderTable();
            document.getElementById('updateTime').innerText = '最後更新時間: ' + new Date().toLocaleTimeString();
            document.getElementById('loading').style.display = 'none';
            document.getElementById('trafficTable').style.display = 'table';

        } catch (error) {
            console.error("Fetch error:", error);
            document.getElementById('loading').innerHTML = `<span class="error">資料載入失敗：${error.message}</span>`;
        }
    }

    function formatDirection(dir) {
        const dirMap = { 'N': '北上', 'S': '南下', 'E': '東向', 'W': '西向' };
        return dirMap[dir] || dir;
    }

    function renderTable() {
        const body = document.getElementById('trafficBody');
        const filter = document.getElementById('search').value.toLowerCase();
        body.innerHTML = '';

        trafficData.forEach(item => {
            if (item.name.toLowerCase().includes(filter)) {
                let speedClass = 'speed-green';
                if (item.speed < 40) speedClass = 'speed-red';
                else if (item.speed < 70) speedClass = 'speed-orange';

                const row = `<tr>
                    <td><strong>${item.name}</strong></td>
                    <td>${formatDirection(item.direction)}</td>
                    <td><span class="speed-tag ${speedClass}">${item.speed}</span> km/h</td>
                </tr>`;
                body.insertAdjacentHTML('beforeend', row);
            }
        });
    }

    document.getElementById('search').addEventListener('input', renderTable);

    // 初始執行與定時更新 (3分鐘)
    fetchTrafficData();
    setInterval(fetchTrafficData, 180000);
</script>

</body>
</html>
